name: Terraform Plan

run-name: Terraform Plan ${{ inputs.github_environment }} by ${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      github_environment:
        description: GitHub environment containing Terraform plan credentials and tfvars
        required: true
        type: choice
        default: sandbox
        options:
          - sandbox
          - production
      terraform_workspace:
        description: Existing Terraform workspace to plan against
        required: true
        type: string
        default: sandbox

permissions:
  contents: read

concurrency:
  group: terraform-plan-${{ inputs.github_environment }}-${{ inputs.terraform_workspace }}
  cancel-in-progress: false

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment }}
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      PLAN_ARTIFACT_NAME: terraform-plan-${{ inputs.github_environment }}-${{ inputs.terraform_workspace }}-${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Check environment and workspace pairing
        env:
          GITHUB_ENVIRONMENT: ${{ inputs.github_environment }}
          TERRAFORM_WORKSPACE: ${{ inputs.terraform_workspace }}
        run: |
          set -euo pipefail

          if [ "$GITHUB_ENVIRONMENT" = "production" ] && [ "$TERRAFORM_WORKSPACE" != "default" ]; then
            echo "ERROR: production Terraform plans must use the default workspace."
            exit 1
          fi

          if [ "$GITHUB_ENVIRONMENT" = "sandbox" ] && [ "$TERRAFORM_WORKSPACE" != "sandbox" ]; then
            echo "ERROR: sandbox Terraform plans must use the sandbox workspace."
            exit 1
          fi

      - name: Write Terraform variables
        env:
          TERRAFORM_TFVARS_JSON: ${{ secrets.TERRAFORM_TFVARS_JSON }}
        run: |
          set -euo pipefail

          if [ -z "${TERRAFORM_TFVARS_JSON:-}" ]; then
            echo "ERROR: TERRAFORM_TFVARS_JSON is not configured for this GitHub environment."
            exit 1
          fi

          umask 077
          printf '%s' "$TERRAFORM_TFVARS_JSON" > _infra/terraform.auto.tfvars.json

          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("_infra/terraform.auto.tfvars.json")
          data = json.loads(path.read_text())

          required = ["GITHUB_TOKEN", "AWS_TOKEN_KEY", "DISCORD_CLIENT_ID"]
          missing = [name for name in required if not data.get(name)]
          if missing:
              raise SystemExit(
                  "Missing required Terraform variables in TERRAFORM_TFVARS_JSON: "
                  + ", ".join(missing)
              )

          if data.get("grafana_api_key"):
              raise SystemExit(
                  "grafana_api_key must be empty after Grafana token rotation is active. "
                  "Use grafana_service_account_id plus the Secrets Manager token instead."
              )

          if data.get("grafana_url") and not data.get("grafana_service_account_id"):
              raise SystemExit(
                  "grafana_service_account_id is required when grafana_url is configured."
              )
          PY

      - name: Terraform init
        run: terraform -chdir=_infra init -input=false

      - name: Select or create Terraform workspace
        env:
          TERRAFORM_WORKSPACE: ${{ inputs.terraform_workspace }}
        run: |
          set -euo pipefail
          terraform -chdir=_infra workspace select "$TERRAFORM_WORKSPACE" || terraform -chdir=_infra workspace new "$TERRAFORM_WORKSPACE"

      - name: Terraform validate
        run: terraform -chdir=_infra validate -no-color

      - name: Terraform plan
        id: plan
        run: |
          set +e
          terraform -chdir=_infra plan -no-color -input=false -detailed-exitcode -out=tfplan | tee _infra/terraform-plan.txt
          exit_code=${PIPESTATUS[0]}
          set -e

          if [ "$exit_code" -eq 1 ]; then
            echo "Terraform plan failed."
            exit 1
          fi

          if [ "$exit_code" -eq 2 ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            echo "Terraform plan completed with pending changes."
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
            echo "Terraform plan completed with no pending changes."
          fi

      - name: Record plan artifact metadata
        id: artifact
        if: steps.plan.outputs.changes == 'true'
        run: |
          set -euo pipefail

          sha256sum _infra/tfplan | awk '{print $1}' > _infra/tfplan.sha256

          echo "name=$PLAN_ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "sha256=$(cat _infra/tfplan.sha256)" >> "$GITHUB_OUTPUT"

      - name: Upload reviewed plan artifact
        if: steps.plan.outputs.changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            _infra/tfplan
            _infra/tfplan.sha256
            _infra/terraform-plan.txt
          retention-days: 1
          if-no-files-found: error

      - name: Write summary
        if: always()
        env:
          GITHUB_ENVIRONMENT: ${{ inputs.github_environment }}
          TERRAFORM_WORKSPACE: ${{ inputs.terraform_workspace }}
          PLAN_CHANGES: ${{ steps.plan.outputs.changes || 'unknown' }}
          PLAN_ARTIFACT_NAME: ${{ steps.artifact.outputs.name || '' }}
          PLAN_SHA256: ${{ steps.artifact.outputs.sha256 || '' }}
        run: |
          {
            echo "## Terraform Plan"
            echo
            echo "- GitHub environment: \`$GITHUB_ENVIRONMENT\`"
            echo "- Terraform workspace: \`$TERRAFORM_WORKSPACE\`"
            echo "- Pending changes: \`$PLAN_CHANGES\`"

            if [ -n "$PLAN_ARTIFACT_NAME" ]; then
              echo "- Plan run ID: \`$GITHUB_RUN_ID\`"
              echo "- Apply artifact: \`$PLAN_ARTIFACT_NAME\`"
              echo "- Plan SHA-256: \`$PLAN_SHA256\`"
              echo
              echo "Use \`.github/workflows/terraform-apply.yml\` with this run ID, artifact name, and SHA-256 after reviewing the plan output."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remove generated tfvars
        if: always()
        run: rm -f _infra/terraform.auto.tfvars.json _infra/tfplan _infra/tfplan.sha256 _infra/terraform-plan.txt
