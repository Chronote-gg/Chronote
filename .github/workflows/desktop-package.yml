name: Desktop Package

on:
  pull_request:
    paths:
      - ".github/workflows/desktop-package.yml"
      - "apps/desktop/**"
      - "scripts/desktop-*.js"
      - "scripts/desktop-*.mjs"
      - "package.json"
  push:
    branches: [master]
    paths:
      - ".github/workflows/desktop-package.yml"
      - "apps/desktop/**"
      - "scripts/desktop-*.js"
      - "scripts/desktop-*.mjs"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  package:
    name: Build Windows Desktop Artifacts
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: "yarn"
          cache-dependency-path: |
            yarn.lock
            apps/desktop/yarn.lock

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Install desktop dependencies
        run: yarn desktop:install

      - name: Run desktop API coverage
        run: yarn test:desktop:coverage

      - name: Build unsigned desktop package
        run: yarn desktop:package

      - name: Validate desktop artifacts
        run: yarn desktop:artifacts --write

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: chronote-desktop-windows-unsigned
          path: apps/desktop/src-tauri/target/release/bundle/**

  packaged-smoke:
    name: Packaged Desktop Smoke
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: "yarn"
          cache-dependency-path: |
            yarn.lock
            apps/desktop/yarn.lock

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Install desktop dependencies
        run: yarn desktop:install

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install Microsoft Edge WebDriver
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\msedgedriver" | Out-Null
          cargo install --git https://github.com/chippers/msedgedriver-tool
          Push-Location "$env:RUNNER_TEMP\msedgedriver"
          & "$env:USERPROFILE\.cargo\bin\msedgedriver-tool.exe"
          $driver = Get-ChildItem -Path "$env:RUNNER_TEMP\msedgedriver" -Filter "msedgedriver.exe" -Recurse | Select-Object -First 1
          if ($null -eq $driver) {
            throw "msedgedriver.exe was not downloaded."
          }
          $driver.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Append
          "CHRONOTE_DESKTOP_WEBDRIVER_DIR=$($driver.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Pop-Location

      - name: Run packaged desktop smoke
        run: yarn desktop:smoke:packaged
